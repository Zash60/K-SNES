apply plugin: 'com.android.library'

android {
    namespace 'com.kansus.ksnes.snes9x'
    compileSdk project.ext.compileSdkVer

    defaultConfig {
        minSdk project.ext.minSdkVer
        targetSdk project.ext.targetSdkVer
        
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

        externalNativeBuild {
            ndkBuild {
                // Configurações modernas de C++ flags vão aqui se necessário
                arguments "NDK_APPLICATION_MK:=src/main/cpp/Application.mk"
                cFlags "-D__STDC_FORMAT_MACROS"
            }
        }
        
        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }

    externalNativeBuild {
        ndkBuild {
            path 'src/main/cpp/Android.mk'
        }
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation project.ext.supportDependencies.appCompat
    testImplementation "junit:junit:${project.ext.junitVer}"
    
    implementation project(':abstractemulator')
}
