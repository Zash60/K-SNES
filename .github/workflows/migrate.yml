name: Migrar para AndroidX

on:
  workflow_dispatch: # Permite rodar manualmente pela aba Actions do GitHub

jobs:
  migrate-code:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permissão para commitar as mudanças

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Executar Migração
      run: |
        # Procura e substitui AppCompatActivity
        find . -type f \( -name "*.java" -o -name "*.xml" \) -exec sed -i 's/android.support.v7.app.AppCompatActivity/androidx.appcompat.app.AppCompatActivity/g' {} +
        
        # Procura e substitui NonNull
        find . -type f \( -name "*.java" -o -name "*.xml" \) -exec sed -i 's/android.support.annotation.NonNull/androidx.annotation.NonNull/g' {} +
        
        # Procura e substitui Nullable (Recomendado fazer junto)
        find . -type f \( -name "*.java" -o -name "*.xml" \) -exec sed -i 's/android.support.annotation.Nullable/androidx.annotation.Nullable/g' {} +

        # Garante que o gradle.properties tenha as flags do AndroidX
        echo "android.useAndroidX=true" >> gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        # Remove duplicatas caso já existissem
        sort -u -o gradle.properties gradle.properties

    - name: Commitar mudanças
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Refactor: Migração automática para AndroidX (AppCompat e Annotations)"
        branch: ${{ github.head_ref }}
