name: Android Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

# Permissões de escrita não são mais necessárias, então podem ser removidas para maior segurança.
# permissions:
#  contents: write

jobs:
  build-apk: # Renomeei o job para clareza
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      # O 'ref' não é necessário aqui, o checkout padrão já pega o branch do evento.

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r26b
        link-to-sdk: true

    # --- ETAPAS DE MODIFICAÇÃO E COMMIT REMOVIDAS ---
    # Todos os passos 'run:' que usavam 'sed', 'cat', 'echo', etc., para modificar arquivos
    # foram removidos. O passo 'git-auto-commit-action' também foi removido.

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk