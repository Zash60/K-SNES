apply plugin: 'com.android.application'

android {
    namespace 'com.kansus.ksnes'
    compileSdk project.ext.compileSdkVer

    defaultConfig {
        applicationId "com.kansus.ksnes"
        minSdk project.ext.minSdkVer
        targetSdk project.ext.targetSdkVer
        versionCode 1
        versionName "0.1"
        
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    
    // AndroidX & Material
    implementation project.ext.supportDependencies.appCompat
    implementation project.ext.supportDependencies.material
    implementation project.ext.supportDependencies.supportLegacy

    // Dagger
    implementation "com.google.dagger:dagger:${project.ext.daggerVer}"
    annotationProcessor "com.google.dagger:dagger-compiler:${project.ext.daggerVer}"
    compileOnly 'javax.annotation:jsr250-api:1.0'

    // Tests
    testImplementation "junit:junit:${project.ext.junitVer}"
    androidTestImplementation "androidx.test.espresso:espresso-core:${project.ext.espressoVer}"

    // Modules
    implementation project(':abstractemulator')
    implementation project(':snes9x')
    implementation project(':input')
    implementation project(':multiplayer')
    implementation project(':preferences')
    implementation project(':roms')
}
